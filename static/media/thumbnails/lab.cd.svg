<svg id="cdSVG" viewBox="0 0 200 150" fill="none" width="1200px" height="900px">
<desc>Fuzzy image of a compact disk.</desc>
<defs>
  <radialGradient id="cdGradBlack" cx="50%" cy="50%" r="100%" >
    <stop offset="0"   stop-color="#000" stop-opacity="1"/>
    <stop offset="0.5" stop-color="#eee" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="cdGradGrey" cx="50%" cy="50%" r="100%" >
    <stop offset="0.2" stop-color="#eee" stop-opacity="0"/>
    <stop offset="0.4" stop-color="#eee" stop-opacity="0.5"/>
    <stop offset="0.5" stop-color="#eee" stop-opacity="1"/>
  </radialGradient>
  <linearGradient id="cdGradColour" gradientTransform="rotate(45)">
    <stop offset="0"    stop-color="#279" />
    <stop offset="0.25" stop-color="#d13" />
    <stop offset="0.35" stop-color="#d13" />
    <stop offset="1"    stop-color="#279" />
  </linearGradient>
</defs>
<rect id="cdBG" fill="#eee" x="0" y="0" width="200" height="150" />
<ellipse id="cdEllpMain" cx="100" cy="75" fill="url(#cdGradColour)" ry="69" rx="71" />
<ellipse id="cdEllpMask" cx="100" cy="75" fill="url(#cdGradGrey)"   ry="70" rx="72" />
<circle id="cdCircHole" cx="100" cy="75" fill="url(#cdGradBlack)" r="70" />
</svg>
